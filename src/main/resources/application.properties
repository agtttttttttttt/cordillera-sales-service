spring.application.name=backend

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.datasource.url=jdbc:mysql://mysql-cdy2203:3306/mydatabase
spring.datasource.username=myuser
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
logging.level.org.springframework.web=trace
logging.level.org.hibernate=trace
logging.level.com=TRACE
logging.file.name=backend.log
server.port=8180

# AWS SQS (reemplazar URL con la de tu cola)
aws.region=us-east-1
aws.sqs.queue.url=https://sqs.us-east-1.amazonaws.com/123456789012/invoice-notifications